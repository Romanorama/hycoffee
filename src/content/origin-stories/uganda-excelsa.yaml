title: Excelsa
country: uganda
species: Excelsa
contentDe:
  region: Zentral Uganda
  image1Alt: Excelsa-Produzentin in Zentral Uganda
  image2Alt: Sortieren von Excelsa-Kirschen
  body: >
    Die Kaffeeart Excelsa (Coffea dewevrei) ist in Uganda heimisch. Aufgrund ihrer hohen
    Produktivität sowie ihrer Widerstandsfähigkeit gegenüber Dürre, Schädlingen und
    Krankheiten wird Excelsa bereits von vielen Kaffeebäuerinnen und -bauern im Land
    angebaut.


    Die geernteten Kirschen werden jedoch häufig zu niedrigen Preisen verkauft und mit
    Robusta-Kaffee geringerer Qualität vermischt. Damit bleibt ein großes Potenzial
    ungenutzt: Richtig geerntet und verarbeitet besitzt Excelsa ein beeindruckendes
    Cupping-Profil.


    Über bestehende Kooperativenstrukturen arbeitet HyCoffee mit Excelsa-Farmern zusammen,
    um Anbau, Ernte, Verarbeitung, Lagerung und Vermarktung von Excelsa zu verbessern.
    Ziel ist es, hochwertige Kaffeebohnen für den Export zu produzieren.


    Damit sich die zusätzlichen Anstrengungen der Farmer auch auszahlen, hat sich HyCoffee
    verpflichtet, den Kaffee zu importieren und den Marktzugang in der Europäischen Union
    zu ermöglichen.
contentEn:
  region: Central Uganda
  image1Alt: Excelsa producer in Central Uganda
  image2Alt: Sorting Excelsa cherries
  body: >-
    The coffee species Excelsa (Coffea dewevrei) is native to Uganda. Thanks to its high
    productivity and resilience to drought, pests and disease, Excelsa is already grown by
    many coffee farmers across the country.


    However, harvested cherries are often sold at low prices and blended with
    lower-quality Robusta coffee. This leaves huge potential untapped: when harvested and
    processed properly, Excelsa has an impressive cupping profile.


    Through existing cooperative structures, HyCoffee works with Excelsa farmers to
    improve cultivation, harvesting, processing, storage and marketing. The goal is to
    produce high-quality coffee beans for export.


    To make sure the farmers' additional efforts pay off, HyCoffee has committed to
    importing the coffee and opening market access in the European Union.
