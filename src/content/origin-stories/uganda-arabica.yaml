title: Arabica
country: uganda
species: Arabica
contentDe:
  region: West Nile Region, Uganda
  image1Alt: Trocknungsbetten in der West Nile Region
  image2Alt: Kaffeekirschen aus der West Nile Region
  body: >
    In Uganda beziehen wir Spezialitäten-Arabica, die in klimaresilienten Anbausystemen in
    der Region West Nile wachsen.


    Diese Gegend gehört zu den am wenigsten investierten Regionen des Landes, und die
    dortigen Kaffeeanbau-Gemeinschaften werden voraussichtlich zu denjenigen gehören, die
    besonders stark vom Klimawandel betroffen sein werden.


    Diese Herausforderungen setzen die Lebensgrundlagen der Landwirte ernsthaft unter
    Druck und zeigen, wie dringend Investitionen in Anpassungsmaßnahmen an den Klimawandel
    sind.


    Deshalb arbeitet HyCoffee unter anderem mit Zombo Coffee Partners zusammen, die eng
    mit der Produzent:innengemeinschaft in der Region zusammenarbeiten. Gemeinsam
    unterstützen wir Produzent:innen beim Übergang zu regenerativen Anbausystemen.


    Die Produzent:innen bauen ihren Kaffee in regenerativen Anbausystemen an, die die
    Bodengesundheit verbessern, die Wasserspeicherung erhöhen und Schatten für die
    Pflanzen schaffen.


    In einer der klimatisch exponiertesten Regionen Ugandas ist regenerative
    Landwirtschaft keine Option, sondern eine Notwendigkeit.
contentEn:
  region: West Nile Region, Uganda
  image1Alt: Drying beds in the West Nile Region
  image2Alt: Coffee cherries from the West Nile Region
  body: >-
    In Uganda, we source specialty Arabica grown in climate-resilient farming systems in
    the West Nile Region.


    This area is one of the least invested regions of the country, and its coffee-growing
    communities are expected to be among those most strongly affected by climate change.


    These challenges put farmers' livelihoods under serious pressure and show how urgently
    investment in climate adaptation is needed.


    That is why HyCoffee works with partners including Zombo Coffee Partners, who
    collaborate closely with producer communities in the region. Together, we support
    producers in the transition to regenerative farming systems.


    The producers grow their coffee in regenerative systems that improve soil health,
    increase water retention and create shade for the plants.


    In one of Uganda's most climate-exposed regions, regenerative agriculture is not
    optional. It is necessary.
