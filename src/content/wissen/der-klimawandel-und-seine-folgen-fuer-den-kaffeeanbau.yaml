    - discriminant: subheading
      value:
        text: "Wilde und hybride Kaffees für einen klimaresilienten Kaffeesektor\L"
    - discriminant: paragraph
      value:
        text: >-
          Wusstet ihr, dass von über 130 bekannten Coffea-Arten weltweit nur
          zwei kommerziell genutzt werden – Arabica und Robusta?

          Durch das geringe Interesse an wilden Kaffeearten, sind viele von
          ohnen allerdings vom Aussterben bedroht (5).  Gleichzeitig können
          genau diese Arten eine wichtige Rolle dabei spielen, den Kaffeeanbau
          an den Klimawandel anzupassen.  Die genetischen Eigenschaften dieser
          Pflanzen sind entscheidend, damit Wissenschaftler:innen
          klimaresiliente Kaffeevarietäten entwickeln können.

          Einige wilde Kaffeearten – etwa Excelsa oder der erst kürzlich
          wiederentdeckte Stenophylla-Kaffee –  bieten sogar eine geschmacklich
          interessante und zugleich Dürre-tolerante Alternative zu Arabica und
          Robusta (6).
