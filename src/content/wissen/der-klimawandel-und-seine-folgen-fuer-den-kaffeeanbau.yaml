title: Der Klimawandel und seine Folgen für den Kaffeeanbau
category: klimawandel
contentDe:
  subtitle: >-
    Bis zum Jahr 2050 könnte der Klimawandel die weltweit für Kaffeeanbau
    geeigneten Flächen um mehr als die Hälfte reduzieren.
  blocks:
    - discriminant: paragraph
      value:
        text: >-
          Die Kaffeepflanze ist stark von stabilen klimatischen Bedingungen
          abhängig und gedeiht nur innerhalb eines engen Spektrums von
          Temperatur- und Niederschlagsmustern. Durch den Klimawandel
          verschieben sich diese Bedingungen jedoch zunehmend: steigende
          Temperaturen, veränderte Regenzeiten und häufigere
          Extremwetterereignisse beeinträchtigen Wachstum, Ertrag und Qualität
          der Kaffeebohnen. Gleichzeitig begünstigen wärmere Klimazonen die
          Ausbreitung von Schädlingen und Pflanzenkrankheiten, was die
          Produktion zusätzlich erschwert.² Arabica und Robusta reagieren
          unterschiedlich auf klimatische Veränderungen, sind jedoch beide stark
          davon betroffen. Arabica gedeiht optimal bei Temperaturen zwischen 15
          und 24 °C. Temperaturen über 24 °C führen zu Stress für die Pflanze
          und können sie erheblich schädigen. Robusta ist zwar hitzetoleranter
          als Arabica und wächst idealerweise bei 22 bis 28 °C, reagiert jedoch
          deutlich empfindlicher auf niedrigere Temperaturen.³ Beide Arten sind
          zudem auf ein bestimmtes jährliches Niederschlagsmuster angewiesen –
          mit einigen Monaten geringer Regenmengen oder sogar relativer
          Trockenheit. Schon kleine Veränderungen dieser optimalen Bedingungen
          können Erträge und Qualität direkt negativ beeinflussen. Aktuelle
          Forschung zeigt, dass sich diese optimalen Anbaubedingungen bereits
          verändern – und sich in Zukunft weiter verschieben werden. Bis 2050
          könnte der Klimawandel die weltweit geeigneten Anbauflächen für Kaffee
          um mehr als die Hälfte reduzieren.⁴ Gleichzeitig steigt die globale
          Nachfrage nach Kaffee stetig. Ein großer Teil dieser Belastung trifft
          Kleinbäuerinnen und Kleinbauern sowie ihre Familien, deren
          Lebensgrundlage direkt vom Kaffeeanbau abhängt. Grüne Kaffeebohnen,
          die von Dürre betroffen sind (links), und solche ohne Dürreschäden
          (rechts).
    - discriminant: image
      value:
        image: >-
          ../../assets/images/cms/wissen/der-klimawandel-und-seine-folgen-fuer-den-kaffeeanbau/contentDe/blocks/1/value/image.jpg
    - discriminant: subheading
      value:
        text: "Wilde und hybride Kaffees für einen klimaresilienten Kaffeesektor\L"
    - discriminant: paragraph
      value:
        text: >-
          Wusstet ihr, dass von über 130 bekannten Coffea-Arten weltweit nur
          zwei kommerziell genutzt werden – Arabica und Robusta?

          Das geringe Interesse an wilden Kaffeearten setzt viele von ihnen
          einem hohen Aussterberisiko aus.⁵  Gleichzeitig können genau diese
          Arten eine wichtige Rolle dabei spielen, den Kaffeeanbau an den
          Klimawandel anzupassen.  Die genetischen Eigenschaften dieser Pflanzen
          sind entscheidend, damit Wissenschaftler klimaresiliente
          Kaffeevarietäten entwickeln können.

          Einige wilde Kaffeearten – etwa Excelsa oder der erst kürzlich
          wiederentdeckte Stenophylla-Kaffee –  bieten sogar eine geschmacklich
          interessante und zugleich Dürre-tolerante  Alternative zu Arabica und
          Robusta.
contentEn:
  title: Climate Change and Its Impact on Coffee Cultivation
  subtitle: >-
    By 2050, climate change could reduce the land suitable for coffee
    cultivation worldwide by more than half.
  body: >-
    The coffee plant depends heavily on stable climatic conditions and thrives
    only within a narrow range of temperature and rainfall patterns. However,
    climate change is increasingly shifting these conditions: rising
    temperatures, changing rainfall seasons, and more frequent extreme weather
    events are affecting growth, yield, and the quality of coffee beans. At the
    same time, warmer climates encourage the spread of pests and plant diseases,
    further complicating production.


    Arabica and Robusta respond differently to climatic changes, but both are
    strongly affected. Arabica grows best at temperatures between 15 and 24 °C.
    Temperatures above 24 °C cause stress to the plant and can significantly
    damage it. Robusta is more heat-tolerant than Arabica and grows ideally at
    22 to 28 °C, but it is more sensitive to lower temperatures. Both species
    also depend on a specific annual rainfall pattern, including periods of low
    precipitation or relative dryness. Even small deviations from these optimal
    conditions can directly reduce yield and quality.


    Current research shows that these ideal growing conditions are already
    changing and will continue to shift in the future. By 2050, climate change
    could reduce the land suitable for coffee cultivation worldwide by more than
    half. At the same time, global demand for coffee continues to rise. Much of
    this pressure falls on smallholder farmers and their families, whose
    livelihoods depend directly on coffee cultivation.


    Green coffee beans affected by drought (left) and those without drought
    damage (right).


    Wild and hybrid coffees for a climate-resilient coffee sector


    Did you know that of more than 130 known Coffea species worldwide, only two
    are commercially used—Arabica and Robusta? The limited interest in wild
    coffee species puts many of them at high risk of extinction. At the same
    time, these species could play a crucial role in adapting coffee cultivation
    to climate change. Their genetic traits are essential for scientists to
    develop climate-resilient coffee varieties.


    Some wild coffee species—such as Excelsa or the recently rediscovered
    Stenophylla coffee—offer not only interesting flavor profiles but also
    greater tolerance to drought, making them potential alternatives to Arabica
    and Robusta.
  blocks: []
