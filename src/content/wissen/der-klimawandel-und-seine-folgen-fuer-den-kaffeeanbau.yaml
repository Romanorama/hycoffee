title: Der Klimawandel und seine Folgen für den Kaffeeanbau
category: klimawandel
contentDe:
  subtitle: >-
    Bis zum Jahr 2050 könnte der Klimawandel die weltweit für Kaffeeanbau
    geeigneten Flächen um mehr als die Hälfte reduzieren.
  blocks:
    - discriminant: paragraph
      value:
        text: >-
          Die Kaffeepflanze ist stark von stabilen klimatischen Bedingungen
          abhängig und gedeiht nur innerhalb eines engen Spektrums von
          Temperatur- und Niederschlagsmustern. Durch den Klimawandel
          verschieben sich diese Bedingungen jedoch zunehmend(1): steigende
          Temperaturen, veränderte Regenzeiten und häufigere
          Extremwetterereignisse beeinträchtigen Wachstum, Ertrag und Qualität
          der Kaffeebohnen. Gleichzeitig begünstigen wärmere Klimazonen die
          Ausbreitung von Schädlingen und Pflanzenkrankheiten, was die
          Produktion zusätzlich erschwert(2).


          Arabica und Robusta reagieren unterschiedlich auf klimatische
          Veränderungen, sind jedoch beide stark davon betroffen. Arabica
          gedeiht optimal bei Temperaturen zwischen 15 und 24 °C. Temperaturen
          über 24 °C führen zu Stress für die Pflanze und können sie erheblich
          schädigen. Robusta ist zwar hitzetoleranter als Arabica und wächst
          idealerweise bei 22 bis 28 °C, reagiert jedoch deutlich empfindlicher
          auf niedrigere Temperaturen(3). Beide Arten sind zudem auf ein
          bestimmtes jährliches Niederschlagsmuster angewiesen – mit einigen
          Monaten geringer Regenmengen oder sogar relativer Trockenheit. Schon
          kleine Veränderungen dieser optimalen Bedingungen können Erträge und
          Qualität direkt negativ beeinflussen. 


          Aktuelle Forschung zeigt, dass sich diese optimalen Anbaubedingungen
          bereits verändern – und sich in Zukunft weiter verschieben werden. Bis
          2050 könnte der Klimawandel die weltweit geeigneten Anbauflächen für
          Kaffee um mehr als die Hälfte reduzieren(1). Gleichzeitig steigt die
          globale Nachfrage nach Kaffee stetig. Ein großer Teil dieser Belastung
          trifft Kleinbäuerinnen und Kleinbauern sowie ihre Familien, deren
          Lebensgrundlage direkt vom Kaffeeanbau abhängt. 
