title: Der Klimawandel und seine Folgen für den Kaffeeanbau
category: klimawandel
subtitle: Bis zum Jahr 2050 könnte der Klimawandel die weltweit für Kaffeeanbau geeigneten Flächen um mehr als die Hälfte reduzieren.
publishedAt: 2026-03-25
readingTime: 6
heroImage: ../../assets/images/cms/wissen/klimawandel-kaffeeanbau.webp
body: |
  Die Kaffeepflanze ist stark von stabilen klimatischen Bedingungen abhängig und gedeiht nur innerhalb eines engen Spektrums von Temperatur- und Niederschlagsmustern.

  Durch den Klimawandel verschieben sich diese Bedingungen jedoch zunehmend: steigende Temperaturen, veränderte Regenzeiten und häufigere Extremwetterereignisse beeinträchtigen Wachstum, Ertrag und Qualität der Kaffeebohnen. Gleichzeitig begünstigen wärmere Klimazonen die Ausbreitung von Schädlingen und Pflanzenkrankheiten, was die Produktion zusätzlich erschwert. Arabica und Robusta reagieren unterschiedlich auf klimatische Veränderungen, sind jedoch beide stark davon betroffen. Arabica gedeiht optimal bei Temperaturen zwischen 15 und 24 °C. Temperaturen über 24 °C führen zu Stress für die Pflanze und können sie erheblich schädigen. Robusta ist zwar hitzetoleranter als Arabica und wächst idealerweise bei 22 bis 28 °C, reagiert jedoch deutlich empfindlicher auf niedrigere Temperaturen.

  Beide Arten sind zudem auf ein bestimmtes jährliches Niederschlagsmuster angewiesen – mit einigen Monaten geringer Regenmengen oder sogar relativer Trockenheit. Schon kleine Veränderungen dieser optimalen Bedingungen können Erträge und Qualität direkt negativ beeinflussen. Aktuelle Forschung zeigt, dass sich diese optimalen Anbaubedingungen bereits verändern – und sich in Zukunft weiter verschieben werden. Bis 2050 könnte der Klimawandel die weltweit geeigneten Anbauflächen für Kaffee um mehr als die Hälfte reduzieren. Gleichzeitig steigt die globale Nachfrage nach Kaffee stetig. Ein großer Teil dieser Belastung trifft Kleinbäuerinnen und Kleinbauern sowie ihre Familien, deren Lebensgrundlage direkt vom Kaffeeanbau abhängt.

  Wilde und hybride Kaffees für einen klimaresilienten Kaffeesektor

  Wusstet ihr, dass von über 130 bekannten Coffea-Arten weltweit nur zwei kommerziell genutzt werden – Arabica und Robusta?

  Das geringe Interesse an wilden Kaffeearten setzt viele von ihnen einem hohen Aussterberisiko aus. Gleichzeitig können genau diese Arten eine wichtige Rolle dabei spielen, den Kaffeeanbau an den Klimawandel anzupassen. Die genetischen Eigenschaften dieser Pflanzen sind entscheidend, damit Wissenschaftler klimaresiliente Kaffeevarietäten entwickeln können. Einige wilde Kaffeearten – etwa Excelsa oder der erst kürzlich wiederentdeckte Stenophylla-Kaffee – bieten sogar eine geschmacklich interessante und zugleich Dürre-tolerante Alternative zu Arabica und Robusta.
