resilienceText: Klimaprojektionen zeigen, dass die Kaffeeproduktion in Ugandas West-Nil-Region besonders stark vom Klimawandel betroffen sein wird. Damit Kaffee eine Einkommensquelle für ländliche Haushalte bleibt, werden Landwirt:innen beim Aufbau regenerativer Anbausysteme unterstützt – für besseren Boden, höhere Wasserretention und mehr Schatten. In einer der heissesten Regionen Ugandas ist regenerative Landwirtschaft eine kritische Anpassungsstrategie und reduziert gleichzeitig die Abhängigkeit von teuren synthetischen Düngemitteln.
socialText: Die West-Nil-Region ist historisch stark unterinvestiert. Das Mikrostationssystem hält die Wertschöpfung bei den Bäuerinnen und Bauern – jede Station wird von einem gewählten Komitee betrieben. Die Landwirt:innen verkaufen ihre Kirschen zwei Drittel über dem Living-Income-Referenzpreis für Ugandan Arabica. So entstehen stabile, bezahlte Arbeitsplätze in ländlichen Dörfern, in denen Erwerbsmöglichkeiten rar sind.
