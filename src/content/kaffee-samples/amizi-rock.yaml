contentDe:
  intro: Amizi Rock – benannt nach einem markanten Felsen neben der Mikrostation – ist ein Specialty Arabica aus Ugandas West-Nil-Region. Kleinbäuerlich in regenerativen Anbausystemen nahe der Grenze zur Demokratischen Republik Kongo kultiviert, wird der Kaffee auf der Gonyobendo Mikrostation verarbeitet, einer von Bäuerinnen und Bauern geführten Station, die konsistente Qualität und lokale Wertschöpfung sichert. Die Bohnen werden auf Raised Beds getrocknet und sorgfältig handsortiert. Das Ergebnis ist eine klare, lebendige Tasse mit kräftig-nussigen Noten, Lakritze, frischer Limette und einer feinen Süsse nach Zuckersirup.
  resilienceText: Klimaprojektionen zeigen, dass die Kaffeeproduktion in Ugandas West-Nil-Region besonders stark vom Klimawandel betroffen sein wird. Damit Kaffee eine Einkommensquelle für ländliche Haushalte bleibt, werden Landwirt:innen beim Aufbau regenerativer Anbausysteme unterstützt – für besseren Boden, höhere Wasserretention und mehr Schatten. In einer der heissesten Regionen Ugandas ist regenerative Landwirtschaft eine kritische Anpassungsstrategie und reduziert gleichzeitig die Abhängigkeit von teuren synthetischen Düngemitteln.
  socialText: Die West-Nil-Region ist historisch stark unterinvestiert. Das Mikrostationssystem hält die Wertschöpfung bei den Bäuerinnen und Bauern – jede Station wird von einem gewählten Komitee betrieben. Die Landwirt:innen verkaufen ihre Kirschen zwei Drittel über dem Living-Income-Referenzpreis für Ugandan Arabica. So entstehen stabile, bezahlte Arbeitsplätze in ländlichen Dörfern, in denen Erwerbsmöglichkeiten rar sind.
contentEn:
  intro: Amizi Rock, named after a distinctive rock next to the microstation, is a specialty Arabica from Uganda's West Nile region. Grown by smallholder farmers in regenerative systems near the border with the Democratic Republic of Congo, the coffee is processed at the Gonyobendo microstation, a farmer-led station that secures consistent quality and local value creation. The beans are dried on raised beds and carefully hand-sorted, resulting in a clear, lively cup with bold nutty notes, licorice, fresh lime, and a soft sugar-syrup sweetness.
  resilienceText: Climate projections show that coffee production in Uganda's West Nile region will be strongly affected by climate change. To keep coffee viable as an income source for rural households, farmers are supported in building regenerative growing systems with healthier soils, better water retention, and more shade. In one of Uganda's hottest regions, regenerative agriculture is a critical adaptation strategy and reduces dependence on costly synthetic fertilizers.
  socialText: The West Nile region has historically seen little investment. The microstation system keeps value creation with farmers, with each station operated by an elected committee. Farmers sell their cherries at two thirds above the living-income reference price for Ugandan Arabica, creating stable paid work in rural villages where employment opportunities are scarce.
