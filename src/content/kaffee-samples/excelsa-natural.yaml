contentDe:
  intro: >-
    Excelsa (Coffea dewevrei) ist in Uganda beheimatet und wird traditionell in
    der Region Zirobwe angebaut. Gemeinsam mit der Uganda Coffee Farmers
    Alliance unterstützt HyCoffee Landwirt:innen dabei, Anbaupraktiken, Ernte
    und Verarbeitung zu verbessern und die Qualität von Excelsa so für den
    europäischen Markt aufzuwerten. Das erhöht Einkommen und stärkt zugleich die
    Klimaresilienz. Die natürliche Trocknung der Kirschen lässt Excelsas
    Charakter strahlen&#58; eine Süsse, die weder an Arabica noch an Robusta
    erinnert – mit Noten von Kefir, Ahornsirup, heller Blutorange und weicher
    Schokolade. Da die Qualitätsverbesserung noch am Anfang steht, liegt das
    aktuelle Niveau auf Commercial – nicht Specialty. Umso spannender für
    klimaresiliente Blends und Dark-Roast-Profile.
  resilienceText: >-
    Excelsa gedeiht bei höheren Temperaturen und geringerer Luftfeuchtigkeit als
    Arabica oder Robusta und ist zudem weniger anfällig für gängige Schädlinge
    und Krankheiten. Im Mischanbau mit Robusta oder Arabica verringert sich das
    Risiko, dass ein klimatischer Schock alle Kulturen gleichzeitig trifft – die
    Arten unterscheiden sich in Wachstumszyklus und Erntezeit. Hinzu kommen
    höhere und verlässlichere Erträge, die Landwirt:innen ein stabileres
    Einkommen und Investitionen in Klimaanpassung ermöglichen.
  socialText: >-
    Unser Excelsa stammt aus einem Kooperativen-Netzwerk in Zentraluganda.
    Gemeinsam mit den Produzent:innen verbessern wir Qualität und erproben neue,
    experimentelle Verarbeitungsmethoden. Wir schaffen einen direkten
    Marktzugang nach Europa, wo Excelsa traditionell kaum eine Rolle gespielt
    hat. HyCoffee zahlt Produzent:innen 200 % des Preises, den sie bislang für
    Excelsa erhalten haben – für höhere Einkommen, eine diversifiziertere
    Produktion und eine resilientere Zukunft.
contentEn:
  intro: >-
    Excelsa (Coffea dewevrei) is native to Uganda and has traditionally been
    grown in the Zirobwe region. Together with the Uganda Coffee Farmers
    Alliance, HyCoffee supports farmers in improving cultivation, harvesting,
    and processing practices so Excelsa can reach a higher quality level for the
    European market. This increases income while strengthening climate
    resilience. Natural drying lets Excelsa's character shine: a sweetness
    unlike Arabica or Robusta, with notes of kefir, maple syrup, bright blood
    orange, and soft chocolate. As quality improvement is still at an early
    stage, the current level is commercial rather than specialty, making it
    especially interesting for climate-resilient blends and dark-roast profiles.
  resilienceText: >-
    Excelsa thrives at higher temperatures and lower humidity than Arabica or
    Robusta and is less susceptible to common pests and diseases. When grown
    alongside Robusta or Arabica, it reduces the risk that one climate shock
    affects every crop at the same time because the species differ in growth
    cycle and harvest timing. Higher and more reliable yields also give farmers
    more stable income and more room to invest in climate adaptation.
  socialText: >-
    Our Excelsa comes from a cooperative network in central Uganda. Together
    with producers, we improve quality and test new experimental processing
    methods. We create direct market access to Europe, where Excelsa has
    traditionally played only a small role. HyCoffee pays producers 200 percent
    of the price they previously received for Excelsa, supporting higher
    incomes, more diversified production, and a more resilient future.
