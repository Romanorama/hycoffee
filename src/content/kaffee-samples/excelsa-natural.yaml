intro: Excelsa (Coffea dewevrei) ist in Uganda beheimatet und wird traditionell in der Region Zirobwe angebaut. Gemeinsam mit der Uganda Coffee Farmers Alliance unterstützt HyCoffee Landwirt:innen dabei, Anbaupraktiken, Ernte und Verarbeitung zu verbessern und die Qualität von Excelsa so für den europäischen Markt aufzuwerten. Das erhöht Einkommen und stärkt zugleich die Klimaresilienz. Die natürliche Trocknung der Kirschen lässt Excelsas Charakter strahlen&#58; eine Süsse, die weder an Arabica noch an Robusta erinnert – mit Noten von Kefir, Ahornsirup, heller Blutorange und weicher Schokolade. Da die Qualitätsverbesserung noch am Anfang steht, liegt das aktuelle Niveau auf Commercial – nicht Specialty. Umso spannender für klimaresiliente Blends und Dark-Roast-Profile.
