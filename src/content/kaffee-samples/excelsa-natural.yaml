resilienceText: Excelsa gedeiht bei höheren Temperaturen und geringerer Luftfeuchtigkeit als Arabica oder Robusta und ist zudem weniger anfällig für gängige Schädlinge und Krankheiten. Im Mischanbau mit Robusta oder Arabica verringert sich das Risiko, dass ein klimatischer Schock alle Kulturen gleichzeitig trifft – die Arten unterscheiden sich in Wachstumszyklus und Erntezeit. Hinzu kommen höhere und verlässlichere Erträge, die Landwirt:innen ein stabileres Einkommen und Investitionen in Klimaanpassung ermöglichen.
socialText: Unser Excelsa stammt aus einem Kooperativen-Netzwerk in Zentraluganda. Gemeinsam mit den Produzent:innen verbessern wir Qualität und erproben neue, experimentelle Verarbeitungsmethoden. Wir schaffen einen direkten Marktzugang nach Europa, wo Excelsa traditionell kaum eine Rolle gespielt hat. HyCoffee zahlt Produzent:innen 200 % des Preises, den sie bislang für Excelsa erhalten haben – für höhere Einkommen, eine diversifiziertere Produktion und eine resilientere Zukunft.
