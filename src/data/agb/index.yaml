heading: Allgemeine Geschäftsbedingungen (AGB)
sections:
  - heading: 1. Anbieter und Geltungsbereich
    body: |-
      Diese Allgemeinen Geschäftsbedingungen gelten für alle Geschäftsbeziehungen zwischen:

      HyCoffee UG (haftungsbeschränkt)
      Tassilostraße 15
      82166 Gräfelfing
      Deutschland

      (nachfolgend "HyCoffee") und ihren Kundinnen und Kunden in Bezug auf die auf dieser Website dargestellten Produkte und Leistungen, insbesondere im Bereich Rohkaffee.
  - heading: 2. Vertragsabschluss
    body: |-
      Die Darstellung von Produkten und Informationen auf der Website stellt kein rechtlich bindendes Angebot dar, sondern eine unverbindliche Einladung zur Kontaktaufnahme und Angebotsanfrage.

      Ein Vertrag kommt erst durch individuelle Annahme seitens HyCoffee zustande, z. B. durch schriftliche Auftragsbestätigung oder Lieferung der Ware.
  - heading: 3. Leistungen und Verfügbarkeit
    body: Angaben zu Verfügbarkeit, Qualität, Herkunft, Ernten und sonstigen Produkteigenschaften erfolgen nach bestem Wissen auf Basis der jeweils vorliegenden Informationen und können saisonal oder chargenbedingt variieren.
  - heading: 4. Preise und Zahlungsbedingungen
    body: |-
      Sofern nicht anders vereinbart, gelten die in Angeboten oder Auftragsbestätigungen ausgewiesenen Preise. Alle Preise verstehen sich, soweit anwendbar, zuzüglich gesetzlicher Umsatzsteuer.

      Zahlungsbedingungen und Zahlungsfristen ergeben sich aus dem jeweiligen Angebot, der Rechnung oder einer gesonderten vertraglichen Vereinbarung.
  - heading: 5. Lieferung und Gefahrübergang
    body: |-
      Liefertermine und Lieferfristen werden individuell vereinbart. Sofern nicht ausdrücklich als verbindlich vereinbart, gelten Angaben zu Lieferzeiten als unverbindlich.

      Die Gefahr des zufälligen Untergangs und der zufälligen Verschlechterung der Ware geht mit Übergabe an das Transportunternehmen auf die Kundin bzw. den Kunden über, sofern gesetzlich zulässig.
  - heading: 6. Eigentumsvorbehalt
    body: Gelieferte Ware bleibt bis zur vollständigen Bezahlung aller Forderungen aus der Geschäftsbeziehung Eigentum von HyCoffee.
  - heading: 7. Gewährleistung
    body: Es gelten die gesetzlichen Mängelrechte. Offensichtliche Mängel sind unverzüglich nach Erhalt der Ware schriftlich anzuzeigen.
  - heading: 8. Haftung
    body: |-
      HyCoffee haftet unbeschränkt bei Vorsatz und grober Fahrlässigkeit sowie bei Verletzung von Leben, Körper oder Gesundheit.

      Bei leicht fahrlässiger Verletzung wesentlicher Vertragspflichten ist die Haftung auf den vertragstypischen, vorhersehbaren Schaden begrenzt. Im Übrigen ist die Haftung ausgeschlossen, soweit gesetzlich zulässig.
  - heading: 9. Datenschutz
    body: Informationen zur Verarbeitung personenbezogener Daten finden Sie in unserer [Datenschutzerklärung](/datenschutz).
  - heading: 10. Schlussbestimmungen
    body: |-
      Es gilt das Recht der Bundesrepublik Deutschland unter Ausschluss des UN-Kaufrechts, sofern dem keine zwingenden Verbraucherschutzvorschriften entgegenstehen.

      Sofern gesetzlich zulässig, ist Gerichtsstand der Sitz von HyCoffee.
  - heading: 11. Hinweis
    body: Diese AGB wurden nach bestem Wissen auf Basis der im Projekt verfügbaren Informationen erstellt und sollten vor finalem Livegang rechtlich geprüft werden.
