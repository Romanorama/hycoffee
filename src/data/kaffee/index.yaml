contentEn:
  pageHeading: "Our Green Coffee Selection\_"
  pageIntro: >-
    The future of coffee begins with new species, varieties, and
    climate-resilient cultivation. We focus on the cultivation and trade of
    climate-resilient coffee. This includes, for example, Arabica grown in
    climate-resilient farming systems such as agroforestry, as well as Excelsa
    (Coffea dewevrei)—a rare coffee species that is significantly more resistant
    to heat, drought, and climate stress. For roasteries, this opens up new
    flavor profiles and a climate-resilient supply chain—for farmers, a
    long-term perspective.
