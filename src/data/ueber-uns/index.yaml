contentDe:
  heroText: >-
    HyCoffee ist ein wissenschaftlich fundiertes, von Frauen geführtes
    Rohkaffeeunternehmen, spezialisiert auf hochwertige, klimaresilientе
    Kaffees. In enger Zusammenarbeit mit Produzent:innen schaffen wir
    langfristige, nachhaltige Lieferketten - für Röster:innen, die mehr wollen
    als guten Kaffee.
  stripImageAlts: []
  storyHeading: Unsere Geschichte
  storyBody: >-
    Wir arbeiten zwischen Ostafrika und Deutschland mit Büros in Kampala und
    Berlin. 


    Unser Fokus liegt auf Klimaresilienz als konkrete Antwort auf die Frage, wie
    Kaffeeanbau langfristig funktionieren kann. Gemeinsam mit Produzent:innen
    vor Ort fördern wir widerstandsfähige Anbausysteme wie Agroforst und
    regenerative Landwirtschaft. Gleichzeitig erschließen wir das Potenzial
    alternativer Kaffeearten wie Excelsa – seit Generationen angebaut, bisher
    kaum auf dem Markt.


    HyCoffee ist die Brücke zwischen Forschung und Praxis: wissenschaftliche
    Erkenntnisse direkt auf die Farm, in die Lieferkette und in die Tasse.


    Gegründet wurde HyCoffee von Charlotte und Sophie. 

    Sophie hat bei den Vereinten Nationen gearbeitet, bevor sie sich auf
    Forschung zu Kaffee und Klimawandel spezialisierte. Die Entdeckung, dass es
    längst klimaresilientere Kaffeearten gibt – kaum bekannt, kaum vermarktet –
    ließ sie nicht mehr los. Forschen allein reichte ihr nicht.


    Charlotte hat in der internationalen Entwicklungszusammenarbeit gearbeitet
    und berät internationale Organisationen und Stiftungen zu Strategie und
    Partnerschaften. Sie kennt aus eigener Erfahrung, wie
    Privatsektor-Partnerschaften echten Wandel bewirken können. Ihr Antrieb:
    Trade instead of Aid – faire Handelspartnerschaften statt Hilfe von außen.
  originsBannerText: Mehr Info zu den Orten, mit denen wir arbeiten
  originsBannerCtaLabel: Origins
  sayHiHeading: 'Say Hy:'
contentEn:
  heroText: >-
    HyCoffee is a science-driven, women-led green coffee company specialising in
    high-quality, climate-resilient coffees. Working closely with producers, we
    build long-term, sustainable supply chains – for roasters who want more than
    just great coffee.
  stripImageAlts: []
  storyHeading: Our story
  storyBody: >-
    We work between East Africa and Germany with offices in Kampala and Berlin. 


    Our focus is climate resilience as a concrete answer to the question of how
    coffee farming can work long-term. Together with producers on the ground, we
    support resilient farming systems such as agroforestry and regenerative
    agriculture. At the same time, we are unlocking the potential of alternative
    coffee varieties like Excelsa – grown for generations, yet barely known on
    the market.


    HyCoffee is the bridge between research and practice: scientific knowledge
    translated directly to the farm, the supply chain, and the cup.


    HyCoffee was founded by Charlotte and Sophie.

    Sophie worked at the United Nations before specialising in research on
    coffee and climate change. The discovery that climate-resilient coffee
    varieties already exist – little known, rarely marketed – wouldn't let her
    go. Research alone wasn't enough.


    Charlotte has worked in international development and advises organisations
    and foundations on strategy and partnerships. She knows from experience how
    private sector partnerships can drive real change. Her conviction: trade
    instead of aid – fair trading relationships over external assistance.
  originsBannerText: More info about the places we work with
  originsBannerCtaLabel: Origins
  sayHiHeading: 'Say Hy:'
