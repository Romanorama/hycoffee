teamBlurb: "Wir sind Sophie und Charlotte, die Gründerinnen von HyCoffee. Zwischen Ostafrika und Deutschland arbeiten wir mit Produzent:innen, Röstereien und der Wissenschaft zusammen, um klimaresiliente Anbausysteme zu fördern und außergewöhnliche Kaffees auf den Markt zu bringen. Unser Ziel: eine faire Kaffeebranche, die auch im Klimawandel bestehen kann."
teamMissionHeading: Unsere Mission
teamCtaLabel: Über uns
speciesHeading: Es gibt 130 bekannte Kaffeearten, viele davon werden nicht kommerziell genutzt. Noch nicht.
