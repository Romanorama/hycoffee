<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="sample-request" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="sample-request" />
      <input type="text" name="bot-field" />
      <input type="text" name="selectedSamples" />
      <input type="text" name="fullName" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="shippingAddress"></textarea>
      <textarea name="message"></textarea>
    </form>

    <form name="newsletter" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="newsletter" />
      <input type="text" name="bot-field" />
      <input type="email" name="email" />
      <input type="text" name="lang" />
    </form>
  </body>
</html>
